name: API Tests

on:
  pull_request:
    paths:
      - "apps/server/**"
      - ".github/workflows/api-tests.yml"
  push:
    branches:
      - main
    paths:
      - "apps/server/**"
      - ".github/workflows/api-tests.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/server
    env:
      API_BASE_URL: http://127.0.0.1:8000
      API_TIMEOUT: "10"
      DATABASE_URL: sqlite:///tests/reports/api-tests.db
      HISTORY_FILE: tests/reports/history.json
      TEMP_REPO_DIR: tests/reports/temp-repos
      GENERATED_DOCS_DIR: tests/reports/generated-docs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/server/requirements.txt
            apps/server/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Prepare reports directory
        run: mkdir -p tests/reports/allure-results

      - name: Run existing tests
        run: python -m pytest -m "not api" --alluredir=tests/reports/allure-results

      - name: Start FastAPI service
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > tests/reports/api-server.log 2>&1 &
          echo $! > tests/reports/api-server.pid

      - name: Wait for service readiness
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat tests/reports/api-server.log
          exit 1

      - name: Run API tests
        run: python -m pytest tests/api --run-api -m "api and not external and not llm" --alluredir=tests/reports/allure-results

      - name: Stop FastAPI service
        if: always()
        run: |
          if [ -f tests/reports/api-server.pid ]; then
            kill "$(cat tests/reports/api-server.pid)" || true
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: apps/server/tests/reports/
          if-no-files-found: warn
          retention-days: 14
