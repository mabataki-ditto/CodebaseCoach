[pytest]
testpaths = tests
addopts = --html=tests/reports/test-report.html --tb=short
log_file = tests/reports/api-tests.log
log_file_level = INFO
log_file_format = %(asctime)s %(levelname)s %(name)s %(message)s
markers =
    unit: 单元测试（不依赖外部服务，可快速执行）
    integration: 集成测试（全链路，需要数据库或网络）
    api: 通过真实 HTTP 端口执行的接口自动化测试
    smoke: 核心接口冒烟测试
    external: 依赖 GitHub 等外部网络服务的测试
    llm: 会调用真实大模型并产生费用的测试
